name: Daily AI Cabinet Session

on:
  schedule:
    # Run daily at 08:00 UTC (09:00 CET)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      decision_file:
        description: 'Path to decision JSON file'
        required: false
        default: 'data/seed/sample_decisions.json'

jobs:
  session:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Check API key is configured
        id: check-key
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret is not configured. Skipping session. Add it to repository secrets to enable daily runs."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-key.outputs.has_key == 'true'

      - name: Install uv
        if: steps.check-key.outputs.has_key == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        if: steps.check-key.outputs.has_key == 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.check-key.outputs.has_key == 'true'
        run: uv sync

      - name: Run AI cabinet session
        if: steps.check-key.outputs.has_key == 'true'
        run: |
          uv run python scripts/run_session.py \
            --decision-file ${{ github.event.inputs.decision_file || 'data/seed/sample_decisions.json' }}

      - name: Upload scorecards
        if: steps.check-key.outputs.has_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scorecards-${{ github.run_number }}
          path: output/*.md
          if-no-files-found: warn
